analysis_task:
  description: >
    1. Прочитать файл {file_name}.
    2. Выделить 3-5 основных тем лекции.
    3. Составить список из 7-10 ключевых терминов на английском языке.
  expected_output: >
    Структурированный план лекции и список извлеченных терминов.
  agent: terminologist

clarification_task:
  description: >
    Проверить извлеченные термины по базе знаний (Knowledge). Если термин отсутствует 
    в глоссарии или имеет несколько значений, найти наиболее подходящий вариант 
    через поиск в интернете.
  expected_output: >
    Таблица: [Термин] -> [Рекомендуемый перевод] -> [Обоснование].
  agent: clarification_agent

final_translation_task:
  description: >
    На основе полученного плана и проверенных терминов составить итоговое 
    учебное резюме (summary) на русском языке. Убедитесь, что все термины 
    соответствуют академическому стилю.
  expected_output: >
    Готовое учебное резюме в формате Markdown.
  agent: translator

hitl_review_task:
  description: >
    Провести финальную вычитку текста. Это критический этап: проверьте, нет ли 
    ошибок в локализации. На этом этапе необходимо получить подтверждение от человека (HITL).
  expected_output: >
    Финальный, утвержденный пользователем текст локализации лекции.
  agent: translator